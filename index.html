<style>
body {
  margin: 0;
  padding: 20px;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #000000, #1a1a1a);
  display: flex;
  justify-content: center;
}

/* GLASS CARD */
.card {
  width: 100%;
  max-width: 380px;
  padding: 25px;
  border-radius: 20px;
  text-align: center;
  backdrop-filter: blur(15px);
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.2);
  box-shadow: 0 0 40px rgba(255,140,0,0.4);
  animation: fadeIn 1s ease;
}

/* ANIMATION */
@keyframes fadeIn {
  from {opacity: 0; transform: translateY(40px);}
  to {opacity: 1; transform: translateY(0);}
}

/* LOGO FIX */
.logo {
  width: 90px;
  padding: 12px;
  background: #fff;
  border-radius: 50%;
  box-shadow: 0 4px 15px rgba(0,0,0,0.3);
  margin-bottom: 10px;
}

/* TITLE */
h1 {
  color: orange;
  margin: 5px 0;
}

/* TAGLINE */
.tagline {
  font-size: 13px;
  color: #ccc;
  margin-bottom: 15px;
}

/* BUTTON */
.btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  text-decoration: none;
  background: linear-gradient(45deg, orange, #ff8c00);
  color: black;
  padding: 14px;
  margin: 8px 0;
  border-radius: 12px;
  font-weight: bold;
  font-size: 15px;
  transition: 0.3s;
}

.btn img {
  width: 20px;
}

.btn:hover {
  transform: scale(1.05);
  box-shadow: 0 0 15px orange;
}

/* SOCIAL */
.social {
  margin: 20px 0;
  display: flex;
  justify-content: center;
  gap: 18px;
}

.social img {
  width: 40px;
  padding: 10px;
  border-radius: 50%;
  background: rgba(255,255,255,0.1);
  transition: 0.3s;
}

.social img:hover {
  transform: scale(1.2);
  background: rgba(255,165,0,0.3);
}

/* CTA */
.cta {
  margin-top: 10px;
  color: orange;
  font-weight: bold;
}

/* FOOTER */
.footer {
  font-size: 13px;
  color: #ddd;
  margin-top: 15px;
}
</style>
